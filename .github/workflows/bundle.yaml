name: bundle

on:
  push:
    branches:
      - master
      - main
    paths:
      - package.json
      - .github/workflows/bundle.yaml
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: ${{ github.workflow }}

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect package version change
        id: version_change
        shell: bash
        run: |
          current_version=$(node -p "require('./package.json').version")

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
            echo "previous_version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            previous_version=$(git show HEAD^:package.json | node -p "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(0, 'utf8')); data.version")
          else
            previous_version=""
          fi

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"

          if [ "$current_version" != "$previous_version" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: JesseTG/rm@v1.0.3
        if: steps.version_change.outputs.changed == 'true'
        with:
          path: dist

      - name: Use Node.js
        if: steps.version_change.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        if: steps.version_change.outputs.changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Bundle project
        if: steps.version_change.outputs.changed == 'true'
        run: pnpm install && pnpm format && pnpm build

      - name: Commit changes
        if: steps.version_change.outputs.changed == 'true'
        uses: EndBug/add-and-commit@v9.1.3
        with:
          default_author: github_actions
          message: '[bot] bundle'

      # 基于 package.json 中的 version 字段创建 tag，修改 version 即可更新版本
      - name: Get package version
        id: package_version
        if: steps.version_change.outputs.changed == 'true' && github.ref_name == 'main'
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "version_with_v=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if v tag exists
        id: check_v_tag
        if: steps.version_change.outputs.changed == 'true' && github.ref_name == 'main'
        uses: mukunku/tag-exists-action@v1.6.0
        with:
          tag: ${{ steps.package_version.outputs.version_with_v }}

      - name: Check if plain tag exists
        id: check_plain_tag
        if: steps.version_change.outputs.changed == 'true' && github.ref_name == 'main'
        uses: mukunku/tag-exists-action@v1.6.0
        with:
          tag: ${{ steps.package_version.outputs.version }}

      - name: Get bundle commit sha
        id: bundle_sha
        if: steps.version_change.outputs.changed == 'true' && github.ref_name == 'main' && (steps.check_v_tag.outputs.exists == 'false' || steps.check_plain_tag.outputs.exists == 'false')
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Create v tag on bundle commit
        if: steps.version_change.outputs.changed == 'true' && github.ref_name == 'main' && steps.check_v_tag.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `${{ steps.package_version.outputs.version_with_v }}`;
            const sha = `${{ steps.bundle_sha.outputs.sha }}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha,
            });

      - name: Create plain tag on bundle commit
        if: steps.version_change.outputs.changed == 'true' && github.ref_name == 'main' && steps.check_plain_tag.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `${{ steps.package_version.outputs.version }}`;
            const sha = `${{ steps.bundle_sha.outputs.sha }}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha,
            });
